apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: reader-role
rules:
  - apiGroups: [""]
    resources: ["pods","services","configmaps","persistentvolumeclaims","nodes","namespaces"]
    verbs: ["get","list","watch"]
  - apiGroups: ["apps","batch","extensions","networking.k8s.io","rbac.authorization.k8s.io","policy"]
    resources: ["*"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: admin-role
rules:
  - apiGroups: [ "" ]
    resources: [ "pods","services","configmaps","persistentvolumeclaims","nodes","namespaces" ]
    verbs: [ "*" ]
  - apiGroups: [ "apps","batch","extensions","networking.k8s.io","rbac.authorization.k8s.io","policy" ]
    resources: [ "*" ]
    verbs: [ "*" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-admin
rules:
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "*" ]